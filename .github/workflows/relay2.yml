name: Deploy Relay2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/relay2/**"
      - "packages/shared/**"
      - "deno.jsonc"
      - "netlify/**"
      - "netlify.toml"
      - ".github/workflows/relay2.yml"

permissions:
  contents: write

concurrency:
  group: transparency-log
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: |
          deno install
          npm install --package-lock=false

      - name: Type-check relay2
        run: deno check packages/relay2/src/main.ts

      - name: Bundle and compute hash
        id: build
        run: |
          HASH=$(
            {
              find packages/relay2/src packages/shared/src -type f -name '*.ts'
              find netlify -type f
              printf '%s\n' packages/relay2/deno.json deno.jsonc netlify.toml
            } | sort | xargs sha256sum | sha256sum | awk '{print $1}'
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Inject relay2 runtime hash
        run: |
          node --input-type=module - <<'NODE'
          import fs from "node:fs";

          const path = "netlify/functions/relay2.ts";
          const text = fs.readFileSync(path, "utf8");
          fs.writeFileSync(
            path,
            text.replace("__SHINE_RELAY2_BUILD_HASH__", process.env.RELAY_HASH),
          );
          NODE
        env:
          RELAY_HASH: ${{ steps.build.outputs.hash }}

      - name: Deploy to Netlify
        run: |
          npx --yes netlify-cli deploy \
            --prod \
            --dir public \
            --functions netlify/functions \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Verify deployed hash
        run: |
          deno eval '
            const baseUrl = Deno.env.get("NETLIFY_RELAY2_URL");
            if (!baseUrl) throw new Error("Missing NETLIFY_RELAY2_URL secret");
            const url = `${baseUrl.replace(/\/$/, "")}/healthz`;
            const expected = Deno.env.get("RELAY_HASH");
            if (!expected) throw new Error("Missing RELAY_HASH");
            const res = await fetch(url);
            if (!res.ok) throw new Error(`healthz failed: ${res.status}`);
            const body = await res.json();
            if (body.hash !== expected) {
              throw new Error(`relay2 hash mismatch: healthz=${body.hash} expected=${expected}`);
            }
          '
        env:
          RELAY_HASH: ${{ steps.build.outputs.hash }}
          NETLIFY_RELAY2_URL: ${{ secrets.NETLIFY_RELAY2_URL }}

      - name: Append to transparency log
        run: |
          set -euo pipefail
          git restore netlify/functions/relay2.ts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin transparency-log:refs/remotes/origin/transparency-log 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/transparency-log; then
            git checkout -B transparency-log origin/transparency-log
          else
            git checkout --orphan transparency-log
            git rm -rf . >/dev/null 2>&1 || true
          fi
          ENTRY=$(node --input-type=module - <<'NODE'
          const entry = {
            relay: "relay2",
            url: process.env.NETLIFY_RELAY2_URL,
            commit: process.env.GITHUB_SHA,
            hash: process.env.RELAY_HASH,
            hash_algorithm: "sha256",
            source_repository: process.env.GITHUB_REPOSITORY,
            workflow_run_id: process.env.GITHUB_RUN_ID,
            timestamp: new Date().toISOString(),
          };
          console.log(JSON.stringify(entry));
          NODE
          )
          touch transparency-log.jsonl
          grep -v "\"relay\":\"relay2\".*\"commit\":\"$GITHUB_SHA\"" transparency-log.jsonl > transparency-log.jsonl.tmp || true
          mv transparency-log.jsonl.tmp transparency-log.jsonl
          echo "$ENTRY" >> transparency-log.jsonl
          git add transparency-log.jsonl
          git commit -m "log: relay2 $GITHUB_SHA"
          git push origin transparency-log
        env:
          RELAY_HASH: ${{ steps.build.outputs.hash }}
          NETLIFY_RELAY2_URL: ${{ secrets.NETLIFY_RELAY2_URL }}
