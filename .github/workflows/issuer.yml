name: Deploy Issuer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/issuer/**"
      - "packages/shared/**"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Build bundle and compute hash
        id: build
        run: |
          cd packages/issuer
          npx wrangler deploy --dry-run --outdir ../../dist/issuer 2>/dev/null || true
          HASH=$(sha256sum ../../dist/issuer/index.js 2>/dev/null | awk '{print $1}' || echo "no-bundle")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Append to transparency log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin transparency-log 2>/dev/null || true
          git checkout transparency-log 2>/dev/null || git checkout --orphan transparency-log
          ENTRY=$(printf '{"relay":"issuer","commit":"%s","hash":"%s","timestamp":"%s"}\n' \
            "$GITHUB_SHA" "${{ steps.build.outputs.hash }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          echo "$ENTRY" >> transparency-log.jsonl
          git add transparency-log.jsonl
          git commit -m "log: issuer ${{ github.sha }}"
          git push origin transparency-log
          git checkout main

      - name: Deploy with injected bundle hash
        run: |
          cd packages/issuer
          npx wrangler deploy --var "BUNDLE_HASH:${{ steps.build.outputs.hash }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
