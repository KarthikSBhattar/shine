# coturn configuration for Shine TURN server.
# Deploy on Fly.io; entrypoint.sh substitutes TURN_EXTERNAL_IP and TURN_SHARED_SECRET.

listening-port=3478
tls-listening-port=5349

# Fly.io assigns a dedicated IPv4; injected by entrypoint.sh
external-ip=__TURN_EXTERNAL_IP__
realm=shine.turn
server-name=shine-turn

# HMAC-SHA1 time-limited credentials (RFC 8489 §9.2)
# Compatible with the SDK's generateTurnCredentials() function
use-auth-secret
static-auth-secret=__TURN_SHARED_SECRET__

# Relay range — Fly.io allows arbitrary UDP port ranges on dedicated IPs
min-port=49152
max-port=65535

# SSRF protection: deny RFC 1918, loopback, link-local, and cloud metadata
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Rate limiting
user-quota=100
total-quota=10000
max-bps=1048576

# Privacy: minimal logging (no client IPs in logs)
no-stdout-log
log-file=/dev/null
no-cli

# Do NOT add no-stun: WebRTC ICE connectivity checks send STUN Binding requests
# through the relay path. Disabling STUN breaks those checks for some browsers.
