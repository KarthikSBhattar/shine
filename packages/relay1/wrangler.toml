name = "shine-relay1"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "9c7d20521f1e9099f117c083bba1db4e"

[vars]
RELAY2_URL     = "https://shine-relay2-live.karthiksbhattar.deno.net"
ISSUER_URL     = "https://shine-issuer.ksb6007.workers.dev"
REQUIRE_TOKEN  = "true"
TOKEN_MODE     = "blind"   # "hmac" | "blind" | "any" (accepts either)
BUNDLE_HASH    = ""        # injected by CI

[observability]
enabled = false

[observability.logs]
invocation_logs = false

# Secrets — set via `wrangler secret put <NAME>`:
#   RELAY1_PRIVATE_KEY_JWK   — from `deno run scripts/keygen.ts`
#   RELAY1_PUBLIC_KEY_RAW    — from `deno run scripts/keygen.ts`
#   RELAY2_HMAC_SECRET       — from `deno run scripts/keygen.ts`
#   ISSUER_SECRET            — from `deno run scripts/keygen.ts`  (shared with issuer worker)
